<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
</style>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Suivi Chat"/>
<title>Suivi Chat</title>
<style>
:root {
  --bg:#f5f5f5;--bg2:#ffffff;--bg3:#ebebeb;--txt:#111111;--txt2:#666666;--txt3:#aaaaaa;
  --border:#e0e0e0;--border2:#cccccc;--card-bg:#ffffff;--input-bg:#f5f5f5;
  --tab-bg:#ebebeb;--tab-active:#ffffff;
  --notif-bg:#FAEEDA;--notif-border:#FAC775;--notif-txt:#633806;
  --ok-bg:#E1F5EE;--ok-border:#1D9E75;--ok-txt:#0F6E56;
  --danger-bg:#FCEBEB;--danger-border:#E24B4A;--danger-txt:#A32D2D;
  --overlay:rgba(0,0,0,0.5);--modal-bg:#ffffff;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0f0f0f;--bg2:#1c1c1e;--bg3:#2c2c2e;--txt:#f2f2f7;--txt2:#aeaeb2;--txt3:#636366;
    --border:#38383a;--border2:#48484a;--card-bg:#1c1c1e;--input-bg:#2c2c2e;
    --tab-bg:#1c1c1e;--tab-active:#3a3a3c;
    --notif-bg:#3a2800;--notif-border:#7a5200;--notif-txt:#FAC775;
    --ok-bg:#0d2b1f;--ok-border:#1D9E75;--ok-txt:#5DCAA5;
    --danger-bg:#2d0a0a;--danger-border:#E24B4A;--danger-txt:#ff8080;
    --overlay:rgba(0,0,0,0.7);--modal-bg:#1c1c1e;
  }
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--txt);}
.app{max-width:430px;margin:0 auto;padding:1rem;padding-bottom:2rem;}
.hdr{text-align:center;margin-bottom:1.25rem;}
.hdr .dt{font-size:13px;color:var(--txt2);}
.hdr .ck{font-size:26px;font-weight:500;color:var(--txt);margin-top:2px;}
.tabs{display:flex;gap:4px;margin-bottom:1rem;}
.tab{flex:1;padding:7px 2px;text-align:center;border-radius:8px;border:0.5px solid var(--border);background:var(--tab-bg);cursor:pointer;font-size:11px;color:var(--txt2);}
.tab.active{background:var(--tab-active);color:var(--txt);font-weight:500;border-color:var(--border2);}
.card{background:var(--card-bg);border:0.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
.ctitle{font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.sgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
.sc{background:var(--bg3);border-radius:8px;padding:8px 10px;}
.sl{font-size:11px;color:var(--txt2);margin-bottom:3px;}
.sv{font-size:20px;font-weight:500;color:var(--txt);}
.score-wrap{background:var(--bg3);border-radius:8px;padding:12px 14px;margin-bottom:1rem;display:flex;align-items:center;gap:14px;}
.score-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
.score-ring svg{transform:rotate(-90deg);}
.score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:500;color:var(--txt);}
.score-title{font-size:14px;font-weight:500;color:var(--txt);}
.score-sub{font-size:12px;color:var(--txt2);margin-top:2px;}
.zones-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.zb{padding:10px 8px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;text-align:left;}
.zn{font-size:13px;font-weight:500;color:var(--txt);}
.zc{font-size:12px;color:var(--txt2);margin-top:2px;}
.med-row{display:flex;align-items:center;justify-content:space-between;}
.cbtn{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--txt);}
.cbtn.done{background:#1D9E75;border-color:#1D9E75;color:white;}
.pb-bg{height:5px;border-radius:3px;background:var(--bg3);margin-top:7px;overflow:hidden;}
.pb{height:100%;border-radius:3px;background:#1D9E75;}
.notif{background:var(--notif-bg);border:0.5px solid var(--notif-border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--notif-txt);margin-bottom:1rem;}
.good-banner{background:var(--ok-bg);border:0.5px solid var(--ok-border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--ok-txt);margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ll{max-height:260px;overflow-y:auto;}
.li{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.li:last-child{border-bottom:none;}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dp{background:#378ADD;}.dm{background:#EF9F27;}
.lactions{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
.lbtn{cursor:pointer;color:var(--txt3);font-size:13px;padding:2px 5px;border-radius:4px;border:0.5px solid var(--border);background:var(--bg3);}
.lbtn.del{color:var(--danger-txt);border-color:var(--danger-border);}
.dh{font-size:12px;font-weight:500;color:var(--txt2);padding:7px 0 3px;border-bottom:0.5px solid var(--border2);display:flex;justify-content:space-between;align-items:center;margin-top:4px;}
.dh-del{font-size:11px;color:var(--danger-txt);cursor:pointer;padding:2px 7px;border-radius:4px;border:0.5px solid var(--danger-border);background:var(--danger-bg);}
.de{font-size:12px;color:var(--txt3);padding:4px 0 5px 14px;border-bottom:0.5px solid var(--border);}
.overlay{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.modal{background:var(--modal-bg);border-radius:16px;padding:1.25rem;width:100%;max-width:340px;max-height:90vh;overflow-y:auto;border:0.5px solid var(--border);}
.modal h3{font-size:15px;font-weight:500;margin-bottom:12px;color:var(--txt);}
.fl{font-size:12px;color:var(--txt2);margin-bottom:6px;}
.ttgl{display:flex;gap:7px;margin-bottom:10px;}
.tbtn{flex:1;padding:7px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;font-size:13px;color:var(--txt);text-align:center;}
.tbtn.active{background:#E1F5EE;border-color:#1D9E75;color:#0F6E56;}
.qh{font-size:11px;color:var(--txt3);margin-bottom:10px;}
.time-mode-toggle{display:flex;gap:6px;margin-bottom:10px;}
.tm-btn{flex:1;padding:7px 4px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;font-size:12px;color:var(--txt2);text-align:center;}
.tm-btn.active{background:#E6F1FB;border-color:#378ADD;color:#185FA5;font-weight:500;}
input[type=time]{width:100%;padding:7px 9px;border-radius:8px;border:0.5px solid var(--border);background:var(--input-bg);color:var(--txt);font-size:15px;font-family:inherit;margin-bottom:4px;}
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.slot-btn{padding:8px 6px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;font-size:12px;color:var(--txt);}
.slot-btn.active{background:#E6F1FB;border-color:#378ADD;color:#0C447C;font-weight:500;}
.slot-sub{font-size:10px;color:var(--txt3);margin-top:2px;}
.slot-btn.active .slot-sub{color:#185FA5;}
.cry-row{display:flex;gap:6px;margin-bottom:4px;}
.cry-btn{flex:1;padding:9px 4px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;text-align:center;font-size:12px;color:var(--txt);}
.cry-btn.active-yes{background:#FCEBEB;border-color:#E24B4A;color:#A32D2D;font-weight:500;}
.cry-btn.active-no{background:#EAF3DE;border-color:#639922;color:#3B6D11;font-weight:500;}
.cry-badge{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:500;}
.cry-yes-b{background:#FCEBEB;color:#A32D2D;}
.cry-no-b{background:#EAF3DE;color:#3B6D11;}
.mact{display:flex;gap:8px;margin-top:14px;}
.btn{flex:1;padding:11px;border-radius:8px;border:0.5px solid var(--border);cursor:pointer;font-size:14px;font-weight:500;background:var(--bg3);color:var(--txt);}
.btn-ok{background:#1D9E75;border-color:#1D9E75;color:white;}
.btn-danger{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger-txt);}
.bar-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:0.5px solid var(--border);}
.bar-row:last-child{border-bottom:none;}
.bar-lbl{width:110px;font-size:12px;color:var(--txt2);flex-shrink:0;}
.bar-bg{flex:1;height:7px;border-radius:4px;background:var(--bg3);overflow:hidden;}
.bar-f{height:100%;border-radius:4px;}
.bar-n{width:20px;text-align:right;font-size:12px;font-weight:500;color:var(--txt);}
.expbtn{width:100%;padding:12px;border-radius:8px;border:0.5px solid #185FA5;background:#E6F1FB;color:#185FA5;cursor:pointer;font-size:14px;font-weight:500;margin-top:4px;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.dur-ctrl{display:flex;align-items:center;gap:10px;}
.dur-btn{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--border);background:var(--bg3);cursor:pointer;font-size:18px;color:var(--txt);display:flex;align-items:center;justify-content:center;}
.dur-val{font-size:16px;font-weight:500;color:var(--txt);min-width:32px;text-align:center;}
</style>
</head>
<body>
<img src="simba.jpg" style="width:100%;max-height:220px;object-fit:cover;border-radius:18px;display:block;margin-bottom:16px;">
<div class="app" id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ZONES=[{id:'toilettes_bas',label:'Toilettes du bas'},{id:'salle_bain',label:'Salle de bain'},{id:'porte_toilettes',label:'Porte toilettes'},{id:'porte_entree',label:"Porte d'entrée"}];
const SLOTS=[
  {id:'nuit',label:'Nuit',sub:'00h–06h',sort:'03:00'},
  {id:'matin',label:'Matin',sub:'06h–12h',sort:'09:00'},
  {id:'aprem',label:'Après-midi',sub:'12h–18h',sort:'15:00'},
  {id:'soiree',label:'Soirée',sub:'18h–00h',sort:'21:00'},
  {id:'nuit_xy',label:'Nuit X→Y',sub:'Entre 2 jours',sort:'02:00'},
];
const START=new Date('2026-03-25');
let cZone=null,cType='pipi',cTab='today',showModal=false,showSettings=false;
let timeMode='exact',selectedSlot=null,cCry=undefined;
let editTs=null,editDateKey=null;
let confirmDeleteDay=null;
let chartInst=null;

function getDuration(){return parseInt(localStorage.getItem('suivi_duration')||'30');}
function setDuration(d){localStorage.setItem('suivi_duration',Math.max(30,Math.min(90,d)));}
function sk(d){return'catlog5_'+d;}
function todayKey(){return new Date().toISOString().slice(0,10);}
function loadDay(d){try{return JSON.parse(localStorage.getItem(sk(d))||'{"medDone":false,"logs":[]}')}catch{return{medDone:false,logs:[]}}}
function saveDay(d,data){try{localStorage.setItem(sk(d),JSON.stringify(data))}catch{}}
function nowTime(){return new Date().toTimeString().slice(0,5);}
function daysElapsed(){return Math.min(Math.floor((new Date()-START)/86400000),getDuration());}
function getDay(o){const d=new Date(START);d.setDate(START.getDate()+o);return d;}
function dateKey(o){return getDay(o).toISOString().slice(0,10);}
function dateLabel(o){return getDay(o).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});}
function isDark(){return window.matchMedia('(prefers-color-scheme:dark)').matches;}
function getDur(){return getDuration();}

function allDays(){
  const dur=getDur();
  return Array.from({length:dur},(_,i)=>{
    const k=dateKey(i);const data=loadDay(k);
    return{offset:i,key:k,label:dateLabel(i),logs:data.logs,medDone:data.medDone};
  });
}
function timeDisplay(log){
  if(log.slot){const s=SLOTS.find(s=>s.id===log.slot);return s?s.label:'?';}
  return log.time||'?';
}
function timeSortKey(log){
  if(log.slot){const s=SLOTS.find(s=>s.id===log.slot);return s?s.sort:'12:00';}
  return log.time||'12:00';
}
function cryLabel(log){
  if(log.cry===true)return'<span class="cry-badge cry-yes-b">A pleuré</span>';
  if(log.cry===false)return'<span class="cry-badge cry-no-b">Sans pleurs</span>';
  return'';
}
function computeScore(){
  const elapsed=daysElapsed();
  if(elapsed===0)return{score:100,label:'Début du traitement',color:'#378ADD'};
  const days=allDays().slice(0,elapsed);
  const total=days.reduce((s,d)=>s+d.logs.length,0);
  const avg=total/elapsed;
  const fh=days.slice(0,Math.floor(elapsed/2));
  const sh=days.slice(Math.floor(elapsed/2));
  const af=fh.length?fh.reduce((s,d)=>s+d.logs.length,0)/fh.length:0;
  const as2=sh.length?sh.reduce((s,d)=>s+d.logs.length,0)/sh.length:0;
  const trend=af>0?(af-as2)/af:0;
  const zeroDays=days.filter(d=>d.logs.length===0).length;
  let score=Math.round(50+trend*30+(zeroDays/elapsed)*20);
  score=Math.max(0,Math.min(100,score));
  let label,color;
  if(score>=75){label='Bonne progression';color='#1D9E75';}
  else if(score>=50){label='Progression stable';color='#378ADD';}
  else if(score>=25){label='À surveiller';color='#EF9F27';}
  else{label="Peu d'amélioration";color='#E24B4A';}
  return{score,label,color,avg:avg.toFixed(1),trend:Math.round(trend*100)};
}
function consecutiveZeros(){
  const elapsed=daysElapsed();let cur=0,best=0;
  for(let i=0;i<elapsed;i++){const d=loadDay(dateKey(i));if(d.logs.length===0){cur++;best=Math.max(best,cur);}else cur=0;}
  return{current:cur,best};
}
function markNoAccident(){
  const k=todayKey();const data=loadDay(k);
  data.noAccident=true;saveDay(k,data);renderApp();
}
function undoClean(){
  const k=todayKey();const data=loadDay(k);
  data.noAccident=false;saveDay(k,data);renderApp();
}

function setType(t){
  cType=t;
  const bp=document.getElementById('tbtn-pipi');const bm=document.getElementById('tbtn-marq');
  if(bp)bp.className='tbtn'+(t==='pipi'?' active':'');
  if(bm)bm.className='tbtn'+(t==='marquage'?' active':'');
  const qh=document.getElementById('qhint');
  if(qh)qh.textContent=t==='pipi'?'Grande quantité':'Petite quantité (marquage)';
}
function setTimeMode(m){
  timeMode=m;selectedSlot=null;
  const te=document.getElementById('tm-exact');const ts=document.getElementById('tm-slot');
  if(te)te.className='tm-btn'+(m==='exact'?' active':'');
  if(ts)ts.className='tm-btn'+(m==='slot'?' active':'');
  const ep=document.getElementById('exact-panel');const sp=document.getElementById('slot-panel');
  if(ep)ep.style.display=m==='exact'?'block':'none';
  if(sp)sp.style.display=m==='slot'?'block':'none';
}
function selectSlot(id){
  selectedSlot=id;
  document.querySelectorAll('.slot-btn').forEach(b=>{b.className='slot-btn'+(b.dataset.slot===id?' active':'');});
}
function setCry(v){
  cCry=v;
  const cy=document.getElementById('cry-yes');const cn=document.getElementById('cry-no');const cns=document.getElementById('cry-nsp');
  if(cy)cy.className='cry-btn'+(v===true?' active-yes':'');
  if(cn)cn.className='cry-btn'+(v===false?' active-no':'');
  if(cns)cns.className='cry-btn'+(v===null?' active-no':'');
}

function openModal(zoneId){
  cZone=zoneId;cType='pipi';timeMode='exact';selectedSlot=null;cCry=undefined;
  editTs=null;editDateKey=null;showModal=true;
  renderApp();
  setTimeout(()=>{
    const mt=document.getElementById('mtime');if(mt)mt.value=nowTime();
    setType('pipi');setTimeMode('exact');
  },10);
}

function openEditModal(ts,dk){
  const data=loadDay(dk);
  const log=data.logs.find(l=>l.ts===ts);
  if(!log)return;
  editTs=ts;editDateKey=dk;
  cZone=log.zone;cType=log.type;cCry=log.cry;
  timeMode=log.slot?'slot':'exact';
  selectedSlot=log.slot||null;
  showModal=true;
  renderApp();
  setTimeout(()=>{
    const mt=document.getElementById('mtime');
    if(mt&&log.time)mt.value=log.time;
    setType(log.type);
    setCry(log.cry===undefined?undefined:log.cry);
    setTimeMode(timeMode);
    if(log.slot){
      setTimeout(()=>selectSlot(log.slot),10);
    }
  },10);
}

function closeModal(){showModal=false;editTs=null;editDateKey=null;renderApp();}

function confirmAccident(){
  const dk=editDateKey||todayKey();
  const data=loadDay(dk);
  if(editTs){
    const idx=data.logs.findIndex(l=>l.ts===editTs);
    if(idx===-1){closeModal();return;}
    let entry=data.logs[idx];
    entry.zone=cZone;entry.type=cType;entry.cry=cCry;
    delete entry.time;delete entry.slot;
    if(timeMode==='exact'){const mt=document.getElementById('mtime');entry.time=mt?mt.value:nowTime();}
    else{if(!selectedSlot){return;}entry.slot=selectedSlot;}
    data.logs[idx]=entry;
  } else {
    data.noAccident=false;
    let entry={zone:cZone,type:cType,ts:Date.now(),cry:cCry};
    if(timeMode==='exact'){const mt=document.getElementById('mtime');entry.time=mt?mt.value:nowTime();}
    else{if(!selectedSlot)return;entry.slot=selectedSlot;}
    data.logs.push(entry);
  }
  data.logs.sort((a,b)=>timeSortKey(a).localeCompare(timeSortKey(b)));
  saveDay(dk,data);showModal=false;editTs=null;editDateKey=null;renderApp();
}

function deleteLog(ts,dk){
  const data=loadDay(dk);
  data.logs=data.logs.filter(l=>l.ts!==ts);
  saveDay(dk,data);renderApp();
}

function askDeleteDay(dk){
  confirmDeleteDay=dk;renderApp();
}
function cancelDeleteDay(){confirmDeleteDay=null;renderApp();}
function doDeleteDay(){
  if(!confirmDeleteDay)return;
  saveDay(confirmDeleteDay,{medDone:false,logs:[],noAccident:false});
  confirmDeleteDay=null;renderApp();
}

function toggleMed(){
  const k=todayKey();const data=loadDay(k);
  data.medDone=!data.medDone;saveDay(k,data);renderApp();
}
function changeDuration(delta){
  const cur=getDuration();setDuration(cur+delta);renderApp();
}
function switchTab(t){cTab=t;showSettings=false;renderApp();}
function toggleSettings(){showSettings=!showSettings;renderApp();}

function updateClock(){
  const now=new Date();
  const el=document.getElementById('ck');const de=document.getElementById('dt');
  if(el)el.textContent=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  if(de)de.textContent=now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}
function getChartColors(){
  return isDark()
    ?{pipi:'#5B9FD4',marq:'#D4891F',grid:'rgba(255,255,255,0.07)',tick:'#888'}
    :{pipi:'#85B7EB',marq:'#EF9F27',grid:'rgba(0,0,0,0.05)',tick:'#888'};
}
function renderChart(){
  const elapsed=daysElapsed();
  const labels=[],dataPipi=[],dataMarq=[];
  for(let i=0;i<Math.max(elapsed,1);i++){
    const d=loadDay(dateKey(i));
    labels.push(dateLabel(i));
    dataPipi.push(d.logs.filter(l=>l.type==='pipi').length);
    dataMarq.push(d.logs.filter(l=>l.type==='marquage').length);
  }
  const canvas=document.getElementById('progChart');if(!canvas)return;
  if(chartInst){chartInst.destroy();chartInst=null;}
  const c=getChartColors();
  chartInst=new Chart(canvas,{type:'bar',data:{labels,datasets:[
    {label:'Pipi normal',data:dataPipi,backgroundColor:c.pipi,stack:'a'},
    {label:'Marquage',data:dataMarq,backgroundColor:c.marq,stack:'a'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
    scales:{
      x:{stacked:true,ticks:{autoSkip:true,maxTicksLimit:10,font:{size:10},color:c.tick},grid:{display:false}},
      y:{stacked:true,beginAtZero:true,ticks:{stepSize:1,font:{size:10},color:c.tick},grid:{color:c.grid}}
    }}});
}
function calColors(cnt,isFuture){
  if(isFuture)return isDark()?{bg:'#2c2c2e',color:'#555'}:{bg:'#f0f0f0',color:'#ccc'};
  if(cnt===0)return isDark()?{bg:'#1a3d1a',color:'#6fcf6f'}:{bg:'#EAF3DE',color:'#3B6D11'};
  if(cnt===1)return isDark()?{bg:'#3d2e00',color:'#f0ad4e'}:{bg:'#FAEEDA',color:'#854F0B'};
  if(cnt===2)return isDark()?{bg:'#3d1a00',color:'#e08060'}:{bg:'#F5C4B3',color:'#712B13'};
  return isDark()?{bg:'#5a0000',color:'#ff8080'}:{bg:'#E24B4A',color:'white'};
}
function renderCalendar(){
  const elapsed=daysElapsed();const dur=getDur();
  let html='<div style="display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;">';

function exportText(){
  const dur=getDur();
  const allLogsFlat=allDays().flatMap(d=>d.logs);
  const zoneTotals={};ZONES.forEach(z=>zoneTotals[z.id]=0);
  allLogsFlat.forEach(l=>{if(zoneTotals[l.zone]!==undefined)zoneTotals[l.zone]++;});
  const streak=consecutiveZeros();
  const elapsed=daysElapsed();
  const zeroDays=allDays().slice(0,Math.max(elapsed,1)).filter(d=>d.logs.length===0).length;
  const totalCry=allLogsFlat.filter(l=>l.cry===true).length;
  const endDate=getDay(dur-1).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  let txt=`SUIVI URINAIRE — CHAT\nPériode : 25/03/2026 → ${endDate} (${dur} jours)\n\n--- RÉSUMÉ ---\n`;
  txt+=`Total accidents : ${allLogsFlat.length}\nDont marquages : ${allLogsFlat.filter(l=>l.type==='marquage').length}\nDont avec pleurs : ${totalCry}\nJours sans accident : ${zeroDays}/${dur}\nMeilleure série sans accident : ${streak.best} jour(s)\n\n`;
  txt+='--- TOTAL PAR ENDROIT ---\n';
  ZONES.forEach(z=>{txt+=`${z.label} : ${zoneTotals[z.id]}\n`;});
  txt+='\n--- JOURNAL DÉTAILLÉ ---\n';
  allDays().forEach((day,i)=>{
    const isFuture=i>daysElapsed();
    const dayData=loadDay(day.key);
    txt+=`J${i+1} — ${day.label} : `;
    if(isFuture)txt+='—\n';
    else if(!day.logs.length)txt+=(dayData.noAccident?'Journée propre confirmée':'Aucun accident')+'\n';
    else{txt+='\n';day.logs.forEach(l=>{const z=ZONES.find(z=>z.id===l.zone);const cry=l.cry===true?' (a pleuré)':l.cry===false?' (sans pleurs)':'';txt+=`  ${timeDisplay(l)} — ${z?z.label:l.zone} — ${l.type}${cry}\n`;});}
  });
  navigator.clipboard.writeText(txt).then(()=>alert('Rapport copié !')).catch(()=>alert(txt));
}

window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{renderApp();});
renderApp();
setInterval(updateClock,1000);
</script>

<script type="module">
const { db, ref, set, onValue } = window.firebaseDB;

const APP_PATH = "sharedState";

function collectState() {
const out = {};
for (let i = 0; i < localStorage.length; i++) {
const key = localStorage.key(i);
if (key === 'suivi_duration' || (key && key.startsWith('catlog5_'))) {
out[key] = localStorage.getItem(key);
}
}
return out;
}

function applyState(data) {
if (!data) return;
Object.entries(data).forEach(([key, value]) => {
localStorage.setItem(key, value);
});
if (typeof renderApp === 'function') renderApp();
}

window.pushStateToFirebase = async function () {
await set(ref(db, APP_PATH), collectState());
};

onValue(ref(db, APP_PATH), (snapshot) => {
const data = snapshot.val();
if (data) applyState(data);
});

const origSaveDay = saveDay;
saveDay = function(d, data) {
origSaveDay(d, data);
window.pushStateToFirebase();
};

const origSetDuration = setDuration;
setDuration = function(d) {
origSetDuration(d);
window.pushStateToFirebase();
};

const origToggleMed = toggleMed;
toggleMed = function() {
origToggleMed();
window.pushStateToFirebase();
};

const origMarkNoAccident = markNoAccident;
markNoAccident = function() {
origMarkNoAccident();
window.pushStateToFirebase();
};

const origUndoClean = undoClean;
undoClean = function() {
origUndoClean();
window.pushStateToFirebase();
};
</script>
